name: CI/CD Pipeline

on:
  push:
    branches:
      - prod
    paths:
      - 'apps/api/**'
      - 'deploy/api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  test:
    name: Run Backend Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v2
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --project apps/api --frozen

      - name: Run Pytest
        env:
          # If real secrets are added in GitHub, they will be loaded. Otherwise fallback to SQLite.
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          REDIS_URL: ${{ secrets.TEST_REDIS_URL }}
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID || 'mock_client_id' }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET || 'mock_client_secret' }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN || 'mock_bot_token' }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID || 'mock_guild_id' }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET || 'mock_session_secret_32_bytes_long_secret_123' }}
          API_INTERNAL_SECRET: ${{ secrets.API_INTERNAL_SECRET || 'mock_internal_secret' }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'mock_nextauth_secret' }}
        run: |
          uv run --project apps/api python -m pytest

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            echo "Starting deployment on VPS..."
            /opt/bnb-api/deploy/api/deploy.sh
